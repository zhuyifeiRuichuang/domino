# 前端服务（集群外访问专用）
apiVersion: v1
kind: Service
metadata:
  name: domino-frontend-nodeport
  namespace: domino
spec:
  type: NodePort
  selector:
    app: domino-frontend
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP

---
# REST服务（集群外访问专用）
apiVersion: v1
kind: Service
metadata:
  name: domino-rest-nodeport
  namespace: domino
spec:
  type: NodePort
  selector:
    app: domino-rest
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP

---
# Postgres服务（可选，不建议对外暴露，仅作示例）
apiVersion: v1
kind: Service
metadata:
  name: domino-postgres-nodeport
  namespace: domino
spec:
  type: NodePort
  selector:
    app: domino-postgres
  ports:
  - port: 5432
    targetPort: 5432
    protocol: TCP
